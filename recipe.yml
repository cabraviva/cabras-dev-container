# vib
name: Cabras Dev Container
id: cabras-dev-container
vibversion: 1.1.0

stages:
  - id: build
    base: debian:stable
    singlelayer: false
    labels:
      maintainer: CabraViva
    args:
      DEBIAN_FRONTEND: noninteractive
    runs:
      commands:
        - >-
          echo 'APT::Install-Recommends "0";' >
          /etc/apt/apt.conf.d/01norecommends
    modules:
      - name: packages-modules
        type: includes
        includes:
          - modules/00-basics.yml
          - modules/01-vanilla-base-files.yml
          - modules/05-go.yml
          - modules/10-python.yml
          - modules/20-build-tools.yml
          - modules/30-gtk.yml
          - modules/40-rust.yml
          - modules/100-apx-gui-deps.yml
          - modules/101-abroot-deps.yml
          - modules/200-vib.yml
        modules:
          - name: basics
            type: apt
            source:
              packages:
                - curl
                - git
                - ssh
                - wget
                - nano
          - name: base-files
            type: dpkg-buildpackage
            source:
              type: git
              url: https://github.com/Vanilla-OS/base-files.git
              branch: main
              commit: latest
              paths:
                - base-files
            modules:
              - name: base-files-deps-install
                type: apt
                source:
                  packages:
                    - dpkg-dev
                    - build-essential
                    - debhelper
          - name: go
            type: apt
            source:
              packages:
                - golang-1.22-go
          - name: python
            type: apt
            source:
              packages:
                - python3
          - name: build-tools
            type: apt
            source:
              packages:
                - meson
                - ninja-build
                - cmake
                - clang
                - clang-format
                - devscripts
                - debhelper
          - name: gtk
            type: apt
            source:
              packages:
                - libgtk-4-dev
                - libadwaita-1-dev
                - libgnome-desktop-4-dev
                - libgweather-4-dev
                - libjpeg-dev
                - blueprint-compiler
                - libnm-dev
                - libnma-dev
                - libnma-gtk4-dev
                - gobject-introspection
          - name: rust
            type: apt
            source:
              packages:
                - rust-all
          - name: apx-gui-deps
            type: apt
            source:
              packages:
                - appstream-util
                - desktop-file-utils
                - libgtk-4-bin
                - libvte-2.91-gtk4-dev
                - python3-gi
                - itstool
          - name: abroot-deps
            type: apt
            source:
              packages:
                - libbtrfs-dev
                - libdevmapper-dev
                - libgpgme-dev
                - pkg-config
                - libdpkg-dev
          - name: vib
            type: shell
            source:
              type: file
              url: https://github.com/Vanilla-OS/Vib/releases/download/v0.7.4/vib
              checksum: 8f95d449cacedcac7bb38f7cfd422689fa5a800c10580e663dea7384473c767f
            commands:
              - mkdir -p /usr/bin
              - cp /sources/vib/vib /usr/bin/vib
              - chmod +x /usr/bin/vib
      - name: host-spawn
        type: shell
        source:
          type: file
          url: >-
            https://github.com/1player/host-spawn/releases/download/v1.6.0/host-spawn-x86_64
          checksum: 75159f0d3924a0bd6d230c6414d19ad44609b5a16671db6624681c910f9bb4ff
        commands:
          - cp /sources/host-spawn/host-spawn /usr/bin/host-spawn
          - chmod +x /usr/bin/host-spawn
      - name: cleanup
        type: shell
        commands:
          - apt autoremove -y
          - apt clean
          - rm -rf /var/cache/*
          - rm -rf /tmp/*
          - rm -rf /var/tmp/*
          - rm -rf /sources
          - mkdir -p /var/cache/apt/archives/partial
      - name: add-manpath-config
        type: shell
        commands:
          - mv /etc/man-path.config /etc/manpath.config

repo: cabraviva/cabras-dev-container
